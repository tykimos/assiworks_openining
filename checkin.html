<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssiWorks 입장 티켓</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
  </head>
  <body data-page="checkin">
    <main class="checkin-page">
      <section class="checkin-panel">
        <p class="eyebrow">AssiWorks Opening</p>
        <h1>입장 티켓</h1>
        <div id="checkin-loading" class="checkin-loading">
          <p>정보를 불러오는 중...</p>
        </div>
        <div id="checkin-result" class="checkin-result" hidden></div>
      </section>
    </main>

    <script>
      (async () => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const loadingEl = document.getElementById('checkin-loading');
        const resultEl = document.getElementById('checkin-result');

        const esc = (s) => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        const showResult = (html, className) => {
          loadingEl.hidden = true;
          resultEl.hidden = false;
          resultEl.className = 'checkin-result ' + (className || '');
          resultEl.innerHTML = html;
        };

        if (!token) {
          showResult('<h2>오류</h2><p>유효하지 않은 링크입니다.</p>', 'checkin-error');
          return;
        }

        try {
          const resp = await fetch('/api/checkin?token=' + encodeURIComponent(token));
          const data = await resp.json();

          if (!resp.ok || !data.ok) {
            const msg = data.cancelled
              ? '<h2>등록 취소됨</h2><p>취소된 등록입니다.</p>'
              : '<h2>오류</h2><p>' + esc(data.message || '등록 정보를 찾을 수 없습니다.') + '</p>';
            showResult(msg, 'checkin-error');
            return;
          }

          const reg = data.registration || {};
          const isCheckedIn = Boolean(data.checked_in_at);

          let statusHtml = '';
          if (isCheckedIn) {
            const time = new Date(data.checked_in_at).toLocaleString('ko-KR');
            statusHtml = '<div class="ticket-status ticket-status-done">체크인 완료 · ' + esc(time) + '</div>';
          } else {
            statusHtml = '<div class="ticket-status ticket-status-pending">행사 당일 이 화면을 스태프에게 보여주세요</div>';
          }

          const html = '<div class="ticket-card">'
            + '<div class="ticket-info">'
            + '<p class="ticket-name">' + esc(reg.name) + '</p>'
            + (reg.affiliation ? '<p class="ticket-detail">' + esc(reg.affiliation) + '</p>' : '')
            + (reg.position ? '<p class="ticket-detail">' + esc(reg.position) + '</p>' : '')
            + '</div>'
            + '<div id="ticket-qr" class="ticket-qr"></div>'
            + statusHtml
            + '<div class="ticket-event">'
            + '<p>📅 2026년 3월 3일 (화) 14:00 ~ 17:00</p>'
            + '<p>📍 서울 종로구 광화문 한국Microsoft 본사 13층</p>'
            + '</div>'
            + '</div>';

          showResult(html, '');

          // Generate QR code
          const checkinUrl = window.location.origin + '/checkin.html?token=' + token;
          const qrEl = document.getElementById('ticket-qr');
          if (qrEl) {
            new QRCode(qrEl, { text: checkinUrl, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
          }
        } catch (err) {
          showResult('<h2>오류</h2><p>서버에 연결할 수 없습니다.</p>', 'checkin-error');
        }
      })();
    </script>
  </body>
</html>
